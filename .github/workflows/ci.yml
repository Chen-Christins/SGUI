name: CI

on:
  push:
    branches: [master, feature/*]
    tags: ['*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --target sgui --config ${{ matrix.build_type }}

      - name: Set package name
        id: name
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          echo "pkg=SGUI-Framework-${VERSION}-${OS}" >> $GITHUB_OUTPUT

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p pkg/include pkg/lib

          # Copy all headers preserving directory structure under src/
          find src -name '*.h' | while read f; do
            dst="pkg/include/${f#src/}"
            mkdir -p "$(dirname "$dst")"
            cp "$f" "$dst"
          done

          # Copy sgui static library (lib/ or build/ as fallback)
          SGUI_LIB=$(find lib build -name "libsgui.a" -not -path "*/CMakeFiles/*" | head -1)
          if [ -z "$SGUI_LIB" ]; then
            echo "ERROR: libsgui.a not found"; exit 1
          fi
          cp "$SGUI_LIB" pkg/lib/

          # Copy raylib static library from build tree
          RAYLIB_LIB=$(find build/_deps -name "libraylib.a" -not -path "*/CMakeFiles/*" | head -1)
          cp "$RAYLIB_LIB" pkg/lib/

          cd pkg && zip -r "../${{ steps.name.outputs.pkg }}.zip" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg/include, pkg/lib | Out-Null

          # Copy all headers preserving directory structure under src/
          Get-ChildItem -Path src -Recurse -Filter *.h | ForEach-Object {
            $dst = "pkg/include/$($_.FullName.Substring($PWD.Path.Length + 5))"
            New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
            Copy-Item $_.FullName $dst
          }

          # Copy sgui static library (lib/ or build/ as fallback)
          $sgui = Get-ChildItem -Path lib, build -Recurse -Name "sgui.lib" |
                    Where-Object { $_ -notmatch "CMakeFiles" } | Select-Object -First 1
          if (-not $sgui) { throw "sgui.lib not found" }
          if ($sgui.StartsWith("lib")) { Copy-Item $sgui pkg/lib/ }
          else { Copy-Item "build/$sgui" pkg/lib/ }

          # Copy raylib static library from build tree
          $raylib = Get-ChildItem -Path build/_deps -Recurse -Name "raylib.lib" |
                    Where-Object { $_ -notmatch "CMakeFiles" } | Select-Object -First 1
          if (-not $raylib) { throw "raylib.lib not found" }
          Copy-Item "build/_deps/$raylib" pkg/lib/

          Compress-Archive -Path pkg/* -DestinationPath "${{ steps.name.outputs.pkg }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.pkg }}
          path: ${{ steps.name.outputs.pkg }}.zip

  release-tag:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: SGUI-Framework-${{ github.ref_name }}-*
          merge-multiple: true
          path: artifacts

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          BODY=$(awk -v tag="$TAG" '
            BEGIN { found = 0; output = "" }
            $0 ~ "^## \\[" tag "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { output = output $0 "\n" }
            END { print output }
          ' CHANGELOG.md)
          BODY=$(echo "$BODY" | sed -n '/./,$p' | tac | sed -n '/./,$p' | tac)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            artifacts/*
        env:
          GH_TOKEN: ${{ github.token }}
